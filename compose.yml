version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: bank-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bank_management_system_springboot
      MYSQL_USER: bank_user
      MYSQL_PASSWORD: bank_password
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      retries: 10
      timeout: 5s

  redis:
    image: redis:7-alpine
    container_name: bank-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bank-backend
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: bank_management_system_springboot
      DB_USERNAME: bank_user
      DB_PASSWORD: bank_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: http://localhost:3000
      PORT: 8080
    volumes:
      # Mount host's application.properties into container so Spring Boot reads it
      - ./src/main/resources/application.properties:/app/application.properties
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8082:8080"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: bank-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_BASE_URL: http://localhost:8082
    restart: unless-stopped

volumes:
  mysql_data:
