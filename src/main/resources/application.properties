# ============================
# Application
# ============================
spring.application.name=BankApplication

# ============================
# Database (MySQL)
# ============================
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:bank-mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:bank_management_system_springboot}
spring.datasource.username=${DB_USERNAME:bank_user}
spring.datasource.password=${DB_PASSWORD:bank_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# JPA / Hibernate
# ============================
spring.jpa.hibernate.ddl-auto=${JPA_HBM2DDL:update}
spring.jpa.database-platform=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false

# ============================
# Server
# ============================
server.port=${PORT:8080}

# ============================
# Redis Cache
# ============================
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:bank-redis}
spring.data.redis.port=${REDIS_PORT:6379}

# ============================
# Actuator
# ============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator

# ============================
# CORS (Frontend Access)
# ============================
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000,http://localhost:8082}
